version: 2.1

jobs:
  build:
    docker:
      - image: recognai/python-37-centos
      - image: mariadb:10.5
        environment:
          MYSQL_DATABASE: myanimebot
          MYSQL_USER: myanimebot
          MYSQL_PASSWORD: myPassword
          MYSQL_RANDOM_ROOT_PASSWORD: yes
    steps:
      - run:
          command: |
            alternatives --install /usr/bin/python python /usr/bin/python2.7 100
            alternatives --set python /usr/bin/python2.7
            yum update -y
            yum install -y git
          name: Installing Git
      - checkout # Import the Git project into the container
      - run:
          command: |
            curl -LsS https://downloads.mariadb.com/MariaDB/mariadb_repo_setup | bash
            yum install -y MariaDB-client MariaDB-common MariaDB-shared MariaDB-devel 
            mysql --version
          name: Installing MariaDB
      - run:
          command: |
            python3.7 --version
            python3.7 -m pip install --upgrade pip
            python3.7 -m pip install -r requirements.txt
            python3.7 -m pip install -U codecov
            python3.7 -m pip install -U pytest-cov
          name: Downloading pip modules
      - run:
          command: |
            mariadb -hlocalhost -umyanimebot -pmyPassword < extra/myanimebot-init.sql
          name: Importing the Database
      - run:
          command: |
            mkdir "logs"
            sed 's/token = 123456789ABCDEF987654321FEDCBA/token = '"$DISCORD_TOKEN"'/' myanimebot.example.conf > myanimebot.conf
          name: Configuring MyAnimeBot
      - run:
          command: |
            python3.7 -m pytest tests
          name: Testing the application

workflows:
  main:
    jobs:
      - build
