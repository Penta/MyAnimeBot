version: 2.1

jobs:
  build-and-test:
    docker:
      - image: centos/python-38-centos7
    steps:
      - run:
          command:
             yum install -y git
          name: install Git
      - checkout
      - run:
          command: |
            curl -LsS https://downloads.mariadb.com/MariaDB/mariadb_repo_setup | bash
            yum install -y MariaDB-client MariaDB-common MariaDB-shared MariaDB-devel 
            mysql --version
          name: Install MariaDB
      - run:
          command: |
            python --version
            pip install -r requirements.txt
          name: install Python dependencies
      - run:
          command: |
            echo "Hello World"
          name: Test

workflows:
  main:
    jobs:
      - build-and-test
