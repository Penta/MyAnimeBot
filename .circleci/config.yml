version: 2.1

jobs:
  build-and-test:
    docker:
      - image: centos:8
    steps:
      - checkout
      - run:
          command: | # Install package dependencies
            curl -LsS https://downloads.mariadb.com/MariaDB/mariadb_repo_setup | sudo bash
            sudo yum install gcc MariaDB-client MariaDB-common MariaDB-shared MariaDB-devel python3
          name: Install dependencies
      - run:
          command: | # use pip to install dependencies
            sudo pip install -r requirements.txt
          name: Pip install dependencies
      - run:
          command: |
            python --version
            mysql --version
            echo "Hello World"
          name: Test

workflows:
  main:
    jobs:
      - build-and-test
