version: 2.1

jobs:
  build-and-test:
    docker:
      - image: centos:8
    steps:
      - checkout
      - run:
          command: | # Install package dependencies
            curl -LsS https://downloads.mariadb.com/MariaDB/mariadb_repo_setup | bash
            yum install -y MariaDB-client MariaDB-common MariaDB-shared MariaDB-devel 
            mysql --version
          name: Install MariaDB
      - run:
          command: | # use pip to install dependencies
            yum install -y gcc python37 python37-pip
            python --version
            pip install -r requirements.txt
          name: install Python
      - run:
          command: |
            echo "Hello World"
          name: Test

workflows:
  main:
    jobs:
      - build-and-test
